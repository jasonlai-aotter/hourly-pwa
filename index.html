<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每小時回顧">
<meta name="theme-color" content="#2c2416">
<title>每小時回顧</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffdf7;
  --ink: #2c2416;
  --ink-light: #7a6e5c;
  --accent: #c4552a;
  --accent-soft: #f0ddd4;
  --line: #e0d8cc;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Noto Serif TC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  overflow-x: hidden;
}

.safe-top { height: calc(var(--safe-top) + 12px); }

.topbar {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); border-bottom: 1px solid var(--line);
  padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
  padding-top: calc(var(--safe-top) + 10px);
}
.topbar-title { font-size: 0.72rem; letter-spacing: 0.2em; color: var(--ink-light); text-transform: uppercase; }
.sync-status {
  font-size: 0.7rem; padding: 4px 10px; border-radius: 20px;
  background: var(--accent-soft); color: var(--accent);
}
.sync-status.syncing { background: #e6e0d4; color: var(--ink-light); }
.sync-status.error { background: #f5d4c8; color: #a13818; }

.hero { padding: 24px 20px 16px; text-align: center; }
.clock-display {
  font-family: 'DM Mono', 'SF Mono', 'Menlo', 'Courier New', monospace;
  font-size: 4rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1;
  color: var(--ink); font-variant-numeric: tabular-nums;
}
.date-label { font-size: 0.75rem; color: var(--ink-light); letter-spacing: 0.1em; margin-top: 6px; }

.progress-section { padding: 0 20px 20px; }
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 0.7rem; color: var(--ink-light); letter-spacing: 0.06em; margin-bottom: 7px;
}
.progress-track { height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s linear; }

.tabs { display: flex; border-bottom: 1px solid var(--line); padding: 0 20px; }
.tab {
  flex: 1; text-align: center; padding: 10px 0;
  font-size: 0.78rem; letter-spacing: 0.06em;
  color: var(--ink-light); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; user-select: none;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.page { display: none; padding: 20px; }
.page.active { display: block; }

.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 0.7rem; letter-spacing: 0.12em;
  color: var(--ink-light); text-transform: uppercase; margin-bottom: 8px;
}
textarea {
  width: 100%; background: var(--surface);
  border: 1px solid var(--line); border-radius: 10px;
  padding: 12px 14px;
  font-family: inherit; font-size: 1rem; color: var(--ink);
  resize: none; line-height: 1.6;
  -webkit-appearance: none; transition: border-color 0.2s;
}
textarea:focus { outline: none; border-color: var(--accent); }

.mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.mood-btn {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 10px 6px;
  font-size: 0.82rem; text-align: center; cursor: pointer;
  transition: all 0.15s; color: var(--ink);
  font-family: inherit; line-height: 1.3;
  -webkit-appearance: none;
}
.mood-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

.submit-btn {
  width: 100%; padding: 16px;
  background: var(--ink); color: var(--bg);
  border: none; border-radius: 12px;
  font-family: inherit; font-size: 1rem; letter-spacing: 0.1em;
  cursor: pointer; margin-top: 6px;
  transition: background 0.2s; -webkit-appearance: none;
}
.submit-btn:active { background: var(--accent); }
.submit-btn:disabled { opacity: 0.5; }

.log-entry {
  background: var(--surface); border: 1px solid var(--line);
  border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0;
  padding: 14px 16px; margin-bottom: 12px;
}
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.log-time {
  font-family: 'DM Mono', 'SF Mono', 'Menlo', monospace;
  font-size: 0.8rem; color: var(--accent); font-variant-numeric: tabular-nums;
}
.log-mood-tag {
  font-size: 0.7rem; background: var(--accent-soft); color: var(--accent);
  padding: 3px 10px; border-radius: 10px;
}
.log-task { font-size: 0.88rem; color: var(--ink); line-height: 1.5; margin-bottom: 4px; }
.log-note { font-size: 0.78rem; color: var(--ink-light); line-height: 1.5; font-style: italic; }
.log-empty { text-align: center; color: var(--ink-light); font-size: 0.85rem; padding: 40px 0; font-style: italic; }
.log-day-divider {
  font-size: 0.72rem; color: var(--ink-light); letter-spacing: 0.1em;
  text-transform: uppercase; margin: 18px 0 10px; padding-left: 4px;
}

.export-btn {
  width: 100%; padding: 13px;
  background: transparent; border: 1px solid var(--line); border-radius: 10px;
  font-family: inherit; font-size: 0.82rem;
  color: var(--ink-light); cursor: pointer; margin-top: 4px;
  letter-spacing: 0.08em; -webkit-appearance: none;
}
.export-btn:active { border-color: var(--accent); color: var(--accent); }

.safe-bot { height: calc(var(--safe-bot) + 20px); }

.setup-overlay {
  position: fixed; inset: 0;
  background: var(--bg); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.setup-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 16px; padding: 32px 24px;
  max-width: 380px; width: 100%; text-align: center;
}
.setup-icon { font-size: 2.5rem; margin-bottom: 12px; }
.setup-card h2 { font-size: 1.15rem; font-weight: 500; margin-bottom: 8px; }
.setup-card p { font-size: 0.85rem; color: var(--ink-light); margin-bottom: 20px; line-height: 1.6; }
.setup-card input {
  width: 100%; padding: 12px 14px;
  background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
  font-family: inherit; font-size: 0.95rem;
  margin-bottom: 14px; -webkit-appearance: none;
}
.setup-card input:focus { outline: none; border-color: var(--accent); }
.setup-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 0.95rem;
  cursor: pointer; -webkit-appearance: none;
}

.toast {
  position: fixed; bottom: calc(var(--safe-bot) + 20px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--bg);
  padding: 10px 20px; border-radius: 20px;
  font-size: 0.82rem; z-index: 150;
  opacity: 0; pointer-events: none;
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="safe-top"></div>

<div class="topbar">
  <div class="topbar-title">每小時回顧</div>
  <div class="sync-status" id="sync-status" onclick="resetAuth()">☁️ 雲端</div>
</div>

<div class="hero">
  <div class="clock-display" id="clock">--:--:--</div>
  <div class="date-label" id="date-label">&nbsp;</div>
</div>

<div class="progress-section">
  <div class="progress-meta">
    <span>本小時進度</span>
    <span id="mins-left">--</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('record')">📝 記錄</div>
  <div class="tab" onclick="switchTab('log')">📋 紀錄列表</div>
</div>

<div class="page active" id="page-record">
  <div class="field">
    <label>處理的事情</label>
    <textarea id="task-input" rows="3" placeholder="例：整理設備標籤、回廠商信件…"></textarea>
  </div>
  <div class="field">
    <label>進度與備注</label>
    <textarea id="note-input" rows="2" placeholder="例：會議室 A/B 完成，C 待確認…"></textarea>
  </div>
  <div class="field">
    <label>當下心情</label>
    <div class="mood-grid" id="mood-grid">
      <button class="mood-btn" data-mood="😊 順暢">😊<br>順暢</button>
      <button class="mood-btn" data-mood="😐 普通">😐<br>普通</button>
      <button class="mood-btn" data-mood="😩 疲累">😩<br>疲累</button>
      <button class="mood-btn" data-mood="🔥 專注">🔥<br>專注</button>
      <button class="mood-btn" data-mood="😤 有點煩">😤<br>有點煩</button>
      <button class="mood-btn" data-mood="😅 忙亂">😅<br>忙亂</button>
    </div>
  </div>
  <button class="submit-btn" id="submit-btn" onclick="submitEntry()">儲存這一小時</button>
  <div class="safe-bot"></div>
</div>

<div class="page" id="page-log">
  <div id="log-list"></div>
  <button class="export-btn" onclick="exportLog()">↓ 匯出全部紀錄</button>
  <div class="safe-bot"></div>
</div>

<div class="setup-overlay" id="setup-overlay" style="display:none">
  <div class="setup-card">
    <div class="setup-icon">🔐</div>
    <h2>首次設定</h2>
    <p>請輸入你的 API 密碼<br>（在 Cloudflare 設定的 API_SECRET）</p>
    <input type="password" id="setup-secret" placeholder="API_SECRET" autocomplete="off">
    <button class="setup-btn" onclick="saveSetup()">連線</button>
  </div>
</div>

<div class="toast" id="toast">已儲存</div>

<script>
  const API_BASE = "https://diaryalarmclock.jason200081.workers.dev";

  let selectedMood = '';
  let allEntries = [];
  let apiSecret = localStorage.getItem('api-secret') || '';

  if (!apiSecret) {
    document.getElementById('setup-overlay').style.display = 'flex';
  } else {
    loadEntries();
  }

  function saveSetup() {
    const v = document.getElementById('setup-secret').value.trim();
    if (!v) { alert('請輸入密碼'); return; }
    apiSecret = v;
    localStorage.setItem('api-secret', v);
    document.getElementById('setup-overlay').style.display = 'none';
    loadEntries();
  }

  function resetAuth() {
    if (!confirm('重設密碼？(資料不會被刪除)')) return;
    localStorage.removeItem('api-secret');
    location.reload();
  }

  async function apiCall(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'X-API-Secret': apiSecret },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE + path, opts);
    if (res.status === 401) {
      localStorage.removeItem('api-secret');
      apiSecret = '';
      document.getElementById('setup-overlay').style.display = 'flex';
      throw new Error('Unauthorized');
    }
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  function setSyncStatus(state, text) {
    const el = document.getElementById('sync-status');
    el.className = 'sync-status' + (state ? ' ' + state : '');
    el.textContent = text;
  }

  async function loadEntries() {
    setSyncStatus('syncing', '⟳ 同步中');
    try {
      const data = await apiCall('/api/list');
      allEntries = data.entries || [];
      setSyncStatus('', '☁️ 已同步');
      renderLog();
    } catch (e) {
      console.error(e);
      setSyncStatus('error', '⚠️ 連線失敗');
    }
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;

    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('date-label').textContent =
      `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} 週${days[now.getDay()]}`;

    const mins = now.getMinutes(), secs = now.getSeconds();
    const elapsed = mins * 60 + secs;
    document.getElementById('progress-fill').style.width = (elapsed/3600*100) + '%';
    const rem = 60 - mins - (secs > 0 ? 1 : 0);
    document.getElementById('mins-left').textContent = rem === 0 ? '即將提醒！' : `${rem} 分鐘後提醒`;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', ['record','log'][i] === name);
    });
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    if (name === 'log' && apiSecret) loadEntries();
  }

  document.getElementById('mood-grid').addEventListener('click', e => {
    const btn = e.target.closest('.mood-btn');
    if (!btn) return;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.dataset.mood;
  });

  async function submitEntry() {
    if (!apiSecret) {
      document.getElementById('setup-overlay').style.display = 'flex';
      return;
    }
    const task = document.getElementById('task-input').value.trim();
    if (!task) { alert('請填寫處理的事情 😊'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '儲存中…';

    const entry = {
      ts: new Date().toISOString(),
      time: new Date().toTimeString().slice(0,5),
      task,
      note: document.getElementById('note-input').value.trim(),
      mood: selectedMood,
    };

    try {
      await apiCall('/api/save', 'POST', entry);
      document.getElementById('task-input').value = '';
      document.getElementById('note-input').value = '';
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      selectedMood = '';
      btn.textContent = '✓ 已儲存';
      toast('已同步到雲端 ☁️');
      setTimeout(() => {
        btn.textContent = '儲存這一小時';
        btn.disabled = false;
      }, 1500);
      loadEntries();
    } catch (e) {
      btn.textContent = '儲存這一小時';
      btn.disabled = false;
      alert('儲存失敗，請檢查網路或密碼');
    }
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    if (!allEntries.length) {
      list.innerHTML = '<div class="log-empty">尚無紀錄<br>第一筆等你來寫 ✦</div>';
      return;
    }

    const sorted = [...allEntries].sort((a,b) => new Date(b.ts) - new Date(a.ts));
    const groups = {};
    sorted.forEach(e => {
      const d = new Date(e.ts);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(e);
    });

    const todayKey = new Date().toISOString().slice(0,10);
    list.innerHTML = Object.keys(groups).map(key => {
      const label = key === todayKey ? `今天 · ${key}` : key;
      return `
        <div class="log-day-divider">${label}</div>
        ${groups[key].map(e => `
          <div class="log-entry">
            <div class="log-header">
              <span class="log-time">${e.time}</span>
              ${e.mood ? `<span class="log-mood-tag">${e.mood}</span>` : ''}
            </div>
            <div class="log-task">${esc(e.task)}</div>
            ${e.note ? `<div class="log-note">${esc(e.note)}</div>` : ''}
          </div>
        `).join('')}
      `;
    }).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function exportLog() {
    if (!allEntries.length) { alert('還沒有紀錄喔！'); return; }
    const sorted = [...allEntries].sort((a,b) => new Date(a.ts) - new Date(b.ts));
    const lines = sorted.map(e => {
      const d = new Date(e.ts);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return `[${ds} ${e.time}]${e.mood ? ' ' + e.mood : ''}\n${e.task}${e.note ? '\n→ ' + e.note : ''}`;
    });
    const text = `每小時回顧 全部紀錄\n${'─'.repeat(28)}\n\n` + lines.join('\n\n');
    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
    a.download = `hourly-all-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  }

  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
  } catch(e) {}

  tick();
  setInterval(tick, 1000);

  setInterval(() => {
    if (document.getElementById('page-log').classList.contains('active') && apiSecret) {
      loadEntries();
    }
  }, 60000);
</script>
</body>
</html>
