<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每小時回顧">
<meta name="theme-color" content="#2c2416">
<title>每小時回顧</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffdf7;
  --ink: #2c2416;
  --ink-light: #7a6e5c;
  --accent: #c4552a;
  --accent-soft: #f0ddd4;
  --line: #e0d8cc;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Noto Serif TC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  overflow-x: hidden;
}

.safe-top { height: calc(var(--safe-top) + 12px); }

.topbar {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); border-bottom: 1px solid var(--line);
  padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
  padding-top: calc(var(--safe-top) + 10px);
}
.topbar-title { font-size: 0.72rem; letter-spacing: 0.2em; color: var(--ink-light); text-transform: uppercase; }
.sync-status {
  font-size: 0.7rem; padding: 4px 10px; border-radius: 20px;
  background: var(--accent-soft); color: var(--accent);
}
.sync-status.syncing { background: #e6e0d4; color: var(--ink-light); }
.sync-status.error { background: #f5d4c8; color: #a13818; }

.hero { padding: 24px 20px 16px; text-align: center; }
.clock-display {
  font-family: 'DM Mono', 'SF Mono', 'Menlo', 'Courier New', monospace;
  font-size: 4rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1;
  color: var(--ink); font-variant-numeric: tabular-nums;
}
.date-label { font-size: 0.75rem; color: var(--ink-light); letter-spacing: 0.1em; margin-top: 6px; }

.progress-section { padding: 0 20px 20px; }
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 0.7rem; color: var(--ink-light); letter-spacing: 0.06em; margin-bottom: 7px;
}
.progress-track { height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s linear; }

.tabs { display: flex; border-bottom: 1px solid var(--line); padding: 0 20px; }
.tab {
  flex: 1; text-align: center; padding: 10px 0;
  font-size: 0.78rem; letter-spacing: 0.06em;
  color: var(--ink-light); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; user-select: none;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.page { display: none; padding: 20px; }
.page.active { display: block; }

.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 0.7rem; letter-spacing: 0.12em;
  color: var(--ink-light); text-transform: uppercase; margin-bottom: 8px;
}
textarea {
  width: 100%; background: var(--surface);
  border: 1px solid var(--line); border-radius: 10px;
  padding: 12px 14px;
  font-family: inherit; font-size: 1rem; color: var(--ink);
  resize: none; line-height: 1.6;
  -webkit-appearance: none; transition: border-color 0.2s;
}
textarea:focus { outline: none; border-color: var(--accent); }

.mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.mood-btn {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 10px 6px;
  font-size: 0.82rem; text-align: center; cursor: pointer;
  transition: all 0.15s; color: var(--ink);
  font-family: inherit; line-height: 1.3;
  -webkit-appearance: none;
}
.mood-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

.submit-btn {
  width: 100%; padding: 16px;
  background: var(--ink); color: var(--bg);
  border: none; border-radius: 12px;
  font-family: inherit; font-size: 1rem; letter-spacing: 0.1em;
  cursor: pointer; margin-top: 6px;
  transition: background 0.2s; -webkit-appearance: none;
}
.submit-btn:active { background: var(--accent); }
.submit-btn:disabled { opacity: 0.5; }

.log-entry {
  background: var(--surface); border: 1px solid var(--line);
  border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0;
  padding: 14px 16px; margin-bottom: 12px;
}
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.log-time {
  font-family: 'DM Mono', 'SF Mono', 'Menlo', monospace;
  font-size: 0.8rem; color: var(--accent); font-variant-numeric: tabular-nums;
}
.log-mood-tag {
  font-size: 0.7rem; background: var(--accent-soft); color: var(--accent);
  padding: 3px 10px; border-radius: 10px;
}
.log-task { font-size: 0.88rem; color: var(--ink); line-height: 1.5; margin-bottom: 4px; }
.log-note { font-size: 0.78rem; color: var(--ink-light); line-height: 1.5; font-style: italic; }
.log-empty { text-align: center; color: var(--ink-light); font-size: 0.85rem; padding: 40px 0; font-style: italic; }
.log-day-divider {
  font-size: 0.72rem; color: var(--ink-light); letter-spacing: 0.1em;
  text-transform: uppercase; margin: 18px 0 10px; padding-left: 4px;
}

.export-btn {
  width: 100%; padding: 13px;
  background: transparent; border: 1px solid var(--line); border-radius: 10px;
  font-family: inherit; font-size: 0.82rem;
  color: var(--ink-light); cursor: pointer; margin-top: 4px;
  letter-spacing: 0.08em; -webkit-appearance: none;
}
.export-btn:active { border-color: var(--accent); color: var(--accent); }

.safe-bot { height: calc(var(--safe-bot) + 20px); }

.setup-overlay {
  position: fixed; inset: 0;
  background: var(--bg); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.setup-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 16px; padding: 32px 24px;
  max-width: 380px; width: 100%; text-align: center;
}
.setup-icon { font-size: 2.5rem; margin-bottom: 12px; }
.setup-card h2 { font-size: 1.15rem; font-weight: 500; margin-bottom: 8px; }
.setup-card p { font-size: 0.85rem; color: var(--ink-light); margin-bottom: 20px; line-height: 1.6; }
.setup-card input {
  width: 100%; padding: 12px 14px;
  background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
  font-family: inherit; font-size: 0.95rem;
  margin-bottom: 14px; -webkit-appearance: none;
}
.setup-card input:focus { outline: none; border-color: var(--accent); }
.setup-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 0.95rem;
  cursor: pointer; -webkit-appearance: none;
}

.toast {
  position: fixed; bottom: calc(var(--safe-bot) + 20px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--bg);
  padding: 10px 20px; border-radius: 20px;
  font-size: 0.82rem; z-index: 150;
  opacity: 0; pointer-events: none;
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Export modal ── */
.export-overlay {
  position: fixed; inset: 0;
  background: rgba(44,36,22,0.5);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 180;
  display: flex; align-items: flex-end; justify-content: center;
}
.export-modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(var(--safe-bot) + 24px);
  width: 100%; max-width: 500px;
  max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.export-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
}
.export-header h3 { font-size: 1.05rem; font-weight: 500; }
.export-close {
  background: transparent; border: none;
  font-size: 1.2rem; color: var(--ink-light);
  cursor: pointer; padding: 4px 8px;
  -webkit-appearance: none;
}
.export-section { margin-bottom: 20px; }
.export-label {
  font-size: 0.7rem; letter-spacing: 0.12em;
  color: var(--ink-light); text-transform: uppercase;
  margin-bottom: 10px;
}
.preset-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}
.preset-btn {
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 4px;
  font-size: 0.78rem; font-family: inherit;
  color: var(--ink); cursor: pointer;
  transition: all 0.15s; -webkit-appearance: none;
}
.preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.date-row {
  display: flex; align-items: center; gap: 10px;
}
.date-row input {
  flex: 1; padding: 10px 12px;
  background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
  font-family: inherit; font-size: 0.88rem;
  color: var(--ink); -webkit-appearance: none;
}
.date-row input:focus { outline: none; border-color: var(--accent); }
.date-dash { color: var(--ink-light); font-size: 0.82rem; }

.format-row { display: flex; gap: 6px; }
.format-btn {
  flex: 1; padding: 10px 4px;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 8px; font-family: inherit;
  font-size: 0.82rem; color: var(--ink);
  cursor: pointer; transition: all 0.15s;
  -webkit-appearance: none;
}
.format-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

.export-preview {
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 8px; padding: 12px;
  font-size: 0.8rem; color: var(--ink-light);
  margin-bottom: 18px; line-height: 1.6;
}
</style>
</head>
<body>

<div class="safe-top"></div>

<div class="topbar">
  <div class="topbar-title">每小時回顧</div>
  <div class="sync-status" id="sync-status" onclick="resetAuth()">☁️ 雲端</div>
</div>

<div class="hero">
  <div class="clock-display" id="clock">--:--:--</div>
  <div class="date-label" id="date-label">&nbsp;</div>
</div>

<div class="progress-section">
  <div class="progress-meta">
    <span>本小時進度</span>
    <span id="mins-left">--</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('record')">📝 記錄</div>
  <div class="tab" onclick="switchTab('log')">📋 紀錄列表</div>
</div>

<div class="page active" id="page-record">
  <div class="field">
    <label>處理的事情</label>
    <textarea id="task-input" rows="3" placeholder="例：整理設備標籤、回廠商信件…"></textarea>
  </div>
  <div class="field">
    <label>進度與備注</label>
    <textarea id="note-input" rows="2" placeholder="例：會議室 A/B 完成，C 待確認…"></textarea>
  </div>
  <div class="field">
    <label>當下心情</label>
    <div class="mood-grid" id="mood-grid">
      <button class="mood-btn" data-mood="😊 順暢">😊<br>順暢</button>
      <button class="mood-btn" data-mood="😐 普通">😐<br>普通</button>
      <button class="mood-btn" data-mood="😩 疲累">😩<br>疲累</button>
      <button class="mood-btn" data-mood="🔥 專注">🔥<br>專注</button>
      <button class="mood-btn" data-mood="😤 有點煩">😤<br>有點煩</button>
      <button class="mood-btn" data-mood="😅 忙亂">😅<br>忙亂</button>
    </div>
  </div>
  <button class="submit-btn" id="submit-btn" onclick="submitEntry()">儲存這一小時</button>
  <div class="safe-bot"></div>
</div>

<div class="page" id="page-log">
  <div id="log-list"></div>
  <button class="export-btn" onclick="openExportModal()">↓ 匯出紀錄</button>
  <div class="safe-bot"></div>
</div>

<!-- Export modal -->
<div class="export-overlay" id="export-overlay" style="display:none">
  <div class="export-modal">
    <div class="export-header">
      <h3>匯出紀錄</h3>
      <button class="export-close" onclick="closeExportModal()">✕</button>
    </div>

    <div class="export-section">
      <div class="export-label">快速選擇</div>
      <div class="preset-grid">
        <button class="preset-btn" onclick="setPreset('today')">今天</button>
        <button class="preset-btn" onclick="setPreset('yesterday')">昨天</button>
        <button class="preset-btn" onclick="setPreset('week')">本週</button>
        <button class="preset-btn" onclick="setPreset('lastweek')">上週</button>
        <button class="preset-btn" onclick="setPreset('month')">本月</button>
        <button class="preset-btn" onclick="setPreset('lastmonth')">上月</button>
        <button class="preset-btn" onclick="setPreset('all')">全部</button>
      </div>
    </div>

    <div class="export-section">
      <div class="export-label">自訂日期範圍</div>
      <div class="date-row">
        <input type="date" id="date-from" onchange="updatePreview(true)">
        <span class="date-dash">到</span>
        <input type="date" id="date-to" onchange="updatePreview(true)">
      </div>
    </div>

    <div class="export-section">
      <div class="export-label">格式</div>
      <div class="format-row">
        <button class="format-btn selected" data-fmt="txt" onclick="selectFormat('txt')">📄 文字</button>
        <button class="format-btn" data-fmt="md" onclick="selectFormat('md')">📝 Markdown</button>
        <button class="format-btn" data-fmt="csv" onclick="selectFormat('csv')">📊 CSV</button>
      </div>
    </div>

    <div class="export-preview" id="export-preview">選擇範圍以預覽…</div>

    <button class="submit-btn" id="export-confirm" onclick="doExport()">下載 0 筆紀錄</button>
  </div>
</div>

<div class="setup-overlay" id="setup-overlay" style="display:none">
  <div class="setup-card">
    <div class="setup-icon">🔐</div>
    <h2>首次設定</h2>
    <p>請輸入你的 API 密碼<br>（在 Cloudflare 設定的 API_SECRET）</p>
    <input type="password" id="setup-secret" placeholder="API_SECRET" autocomplete="off">
    <button class="setup-btn" onclick="saveSetup()">連線</button>
  </div>
</div>

<div class="toast" id="toast">已儲存</div>

<script>
  const API_BASE = "https://diaryalarmclock.jason200081.workers.dev";

  let selectedMood = '';
  let allEntries = [];
  let apiSecret = localStorage.getItem('api-secret') || '';

  if (!apiSecret) {
    document.getElementById('setup-overlay').style.display = 'flex';
  } else {
    loadEntries();
  }

  function saveSetup() {
    const v = document.getElementById('setup-secret').value.trim();
    if (!v) { alert('請輸入密碼'); return; }
    apiSecret = v;
    localStorage.setItem('api-secret', v);
    document.getElementById('setup-overlay').style.display = 'none';
    loadEntries();
  }

  function resetAuth() {
    if (!confirm('重設密碼？(資料不會被刪除)')) return;
    localStorage.removeItem('api-secret');
    location.reload();
  }

  async function apiCall(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'X-API-Secret': apiSecret },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE + path, opts);
    if (res.status === 401) {
      localStorage.removeItem('api-secret');
      apiSecret = '';
      document.getElementById('setup-overlay').style.display = 'flex';
      throw new Error('Unauthorized');
    }
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  function setSyncStatus(state, text) {
    const el = document.getElementById('sync-status');
    el.className = 'sync-status' + (state ? ' ' + state : '');
    el.textContent = text;
  }

  async function loadEntries() {
    setSyncStatus('syncing', '⟳ 同步中');
    try {
      const data = await apiCall('/api/list');
      allEntries = data.entries || [];
      setSyncStatus('', '☁️ 已同步');
      renderLog();
    } catch (e) {
      console.error(e);
      setSyncStatus('error', '⚠️ 連線失敗');
    }
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;

    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('date-label').textContent =
      `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} 週${days[now.getDay()]}`;

    const mins = now.getMinutes(), secs = now.getSeconds();
    const elapsed = mins * 60 + secs;
    document.getElementById('progress-fill').style.width = (elapsed/3600*100) + '%';
    const rem = 60 - mins - (secs > 0 ? 1 : 0);
    document.getElementById('mins-left').textContent = rem === 0 ? '即將提醒！' : `${rem} 分鐘後提醒`;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', ['record','log'][i] === name);
    });
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    if (name === 'log' && apiSecret) loadEntries();
  }

  document.getElementById('mood-grid').addEventListener('click', e => {
    const btn = e.target.closest('.mood-btn');
    if (!btn) return;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.dataset.mood;
  });

  async function submitEntry() {
    if (!apiSecret) {
      document.getElementById('setup-overlay').style.display = 'flex';
      return;
    }
    const task = document.getElementById('task-input').value.trim();
    if (!task) { alert('請填寫處理的事情 😊'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '儲存中…';

    const entry = {
      ts: new Date().toISOString(),
      time: new Date().toTimeString().slice(0,5),
      task,
      note: document.getElementById('note-input').value.trim(),
      mood: selectedMood,
    };

    try {
      await apiCall('/api/save', 'POST', entry);
      document.getElementById('task-input').value = '';
      document.getElementById('note-input').value = '';
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      selectedMood = '';
      btn.textContent = '✓ 已儲存';
      toast('已同步到雲端 ☁️');
      setTimeout(() => {
        btn.textContent = '儲存這一小時';
        btn.disabled = false;
      }, 1500);
      loadEntries();
    } catch (e) {
      btn.textContent = '儲存這一小時';
      btn.disabled = false;
      alert('儲存失敗，請檢查網路或密碼');
    }
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    if (!allEntries.length) {
      list.innerHTML = '<div class="log-empty">尚無紀錄<br>第一筆等你來寫 ✦</div>';
      return;
    }

    const sorted = [...allEntries].sort((a,b) => new Date(b.ts) - new Date(a.ts));
    const groups = {};
    sorted.forEach(e => {
      const d = new Date(e.ts);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(e);
    });

    const todayKey = new Date().toISOString().slice(0,10);
    list.innerHTML = Object.keys(groups).map(key => {
      const label = key === todayKey ? `今天 · ${key}` : key;
      return `
        <div class="log-day-divider">${label}</div>
        ${groups[key].map(e => `
          <div class="log-entry">
            <div class="log-header">
              <span class="log-time">${e.time}</span>
              ${e.mood ? `<span class="log-mood-tag">${e.mood}</span>` : ''}
            </div>
            <div class="log-task">${esc(e.task)}</div>
            ${e.note ? `<div class="log-note">${esc(e.note)}</div>` : ''}
          </div>
        `).join('')}
      `;
    }).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ── Export modal ──
  let selectedFormat = 'txt';

  function openExportModal() {
    if (!allEntries.length) { alert('還沒有紀錄喔！'); return; }
    document.getElementById('export-overlay').style.display = 'flex';
    setPreset('today');
  }

  function closeExportModal() {
    document.getElementById('export-overlay').style.display = 'none';
  }

  function fmtDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function setPreset(preset) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.preset-btn[onclick*="${preset}"]`);
    if (btn) btn.classList.add('active');

    const now = new Date();
    let from, to;

    switch(preset) {
      case 'today':
        from = to = fmtDate(now); break;
      case 'yesterday': {
        const y = new Date(now); y.setDate(y.getDate()-1);
        from = to = fmtDate(y); break;
      }
      case 'week': {
        // 本週一 ~ 今天 (週一為一週開始)
        const day = now.getDay() || 7;
        const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
        from = fmtDate(mon); to = fmtDate(now); break;
      }
      case 'lastweek': {
        const day = now.getDay() || 7;
        const lastMon = new Date(now); lastMon.setDate(now.getDate() - day + 1 - 7);
        const lastSun = new Date(lastMon); lastSun.setDate(lastMon.getDate() + 6);
        from = fmtDate(lastMon); to = fmtDate(lastSun); break;
      }
      case 'month': {
        const first = new Date(now.getFullYear(), now.getMonth(), 1);
        from = fmtDate(first); to = fmtDate(now); break;
      }
      case 'lastmonth': {
        const first = new Date(now.getFullYear(), now.getMonth()-1, 1);
        const last = new Date(now.getFullYear(), now.getMonth(), 0);
        from = fmtDate(first); to = fmtDate(last); break;
      }
      case 'all': {
        if (allEntries.length) {
          const sorted = [...allEntries].sort((a,b) => new Date(a.ts) - new Date(b.ts));
          from = fmtDate(new Date(sorted[0].ts));
          to = fmtDate(new Date(sorted[sorted.length-1].ts));
        } else {
          from = to = fmtDate(now);
        }
        break;
      }
    }

    document.getElementById('date-from').value = from;
    document.getElementById('date-to').value = to;
    updatePreview();
  }

  function selectFormat(fmt) {
    selectedFormat = fmt;
    document.querySelectorAll('.format-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.fmt === fmt);
    });
  }

  function getEntriesInRange() {
    const from = document.getElementById('date-from').value;
    const to = document.getElementById('date-to').value;
    if (!from || !to) return [];
    const fromTs = new Date(from + 'T00:00:00').getTime();
    const toTs = new Date(to + 'T23:59:59').getTime();
    return allEntries
      .filter(e => {
        const t = new Date(e.ts).getTime();
        return t >= fromTs && t <= toTs;
      })
      .sort((a,b) => new Date(a.ts) - new Date(b.ts));
  }

  function updatePreview(fromUserInput) {
    // 自訂日期變動時清除 preset 高亮
    if (fromUserInput) {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    }
    const entries = getEntriesInRange();
    const preview = document.getElementById('export-preview');
    const btn = document.getElementById('export-confirm');

    if (!entries.length) {
      preview.textContent = '此區間內沒有紀錄';
      btn.textContent = '無紀錄可下載';
      btn.disabled = true;
      return;
    }

    const days = new Set(entries.map(e => e.ts.slice(0,10))).size;
    preview.innerHTML = `共 <strong>${entries.length}</strong> 筆紀錄，跨 <strong>${days}</strong> 天<br>
      最早：${entries[0].ts.slice(0,10)} ${entries[0].time}<br>
      最晚：${entries[entries.length-1].ts.slice(0,10)} ${entries[entries.length-1].time}`;
    btn.textContent = `下載 ${entries.length} 筆紀錄`;
    btn.disabled = false;
  }

  function doExport() {
    const entries = getEntriesInRange();
    if (!entries.length) return;
    const from = document.getElementById('date-from').value;
    const to = document.getElementById('date-to').value;
    const rangeLabel = from === to ? from : `${from}_to_${to}`;

    let content, ext, mime;

    if (selectedFormat === 'txt') {
      const lines = entries.map(e => {
        const ds = e.ts.slice(0,10);
        return `[${ds} ${e.time}]${e.mood ? ' ' + e.mood : ''}\n${e.task}${e.note ? '\n→ ' + e.note : ''}`;
      });
      content = `每小時回顧 ${from} ～ ${to}\n${'─'.repeat(28)}\n共 ${entries.length} 筆\n\n` + lines.join('\n\n');
      ext = 'txt'; mime = 'text/plain';
    } else if (selectedFormat === 'md') {
      // 依日期分組
      const groups = {};
      entries.forEach(e => {
        const k = e.ts.slice(0,10);
        if (!groups[k]) groups[k] = [];
        groups[k].push(e);
      });
      const parts = [`# 每小時回顧 ${from} ～ ${to}`, `共 ${entries.length} 筆紀錄\n`];
      Object.keys(groups).sort().forEach(k => {
        parts.push(`\n## ${k}\n`);
        groups[k].forEach(e => {
          parts.push(`### ${e.time}${e.mood ? ' ' + e.mood : ''}`);
          parts.push(`- **事項**: ${e.task}`);
          if (e.note) parts.push(`- **備注**: ${e.note}`);
          parts.push('');
        });
      });
      content = parts.join('\n');
      ext = 'md'; mime = 'text/markdown';
    } else { // csv
      const rows = [['日期','時間','心情','處理事項','進度備注']];
      entries.forEach(e => {
        const ds = e.ts.slice(0,10);
        rows.push([ds, e.time, e.mood || '', e.task, e.note || '']);
      });
      content = rows.map(r => r.map(c =>
        `"${String(c).replace(/"/g,'""')}"`
      ).join(',')).join('\n');
      // BOM for Excel UTF-8 compatibility
      content = '\uFEFF' + content;
      ext = 'csv'; mime = 'text/csv';
    }

    const blob = new Blob([content], { type: mime + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hourly-${rangeLabel}.${ext}`;
    a.click();
    URL.revokeObjectURL(url);

    toast(`已下載 ${entries.length} 筆紀錄 ✓`);
    closeExportModal();
  }

  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
  } catch(e) {}

  tick();
  setInterval(tick, 1000);

  // 移除每 60 秒自動刷新，避免燒 KV 額度
  // 資料只在使用者主動切換到「紀錄列表」或儲存新紀錄時載入
</script>
</body>
</html>
